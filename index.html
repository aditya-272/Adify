<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify Pro Ultimate Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0084ff; --bg: #000814; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top right, #001f3f, var(--bg)); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; color: var(--primary); letter-spacing: 2px; cursor: pointer; }

        .search-wrapper { display: flex; align-items: center; background: var(--glass); border-radius: 20px; padding: 8px 12px; border: 1px solid var(--border); transition: 0.3s; width: 45px; overflow: hidden; cursor: pointer; }
        .search-wrapper.active { width: 220px; border-color: var(--primary); }
        .search-input { border: none; background: transparent; color: white; outline: none; font-size: 14px; margin-left: 10px; width: 170px; display: none; }
        .search-wrapper.active .search-input { display: block; }

        body.in-playlist .search-wrapper { display: none !important; }

        .view { flex: 1; padding: 15px 20px; overflow-y: auto; display: none; }
        .view.active { display: block; }
        
        .section-title { font-size: 10px; color: var(--primary); letter-spacing: 1px; margin: 20px 0 10px; text-transform: uppercase; font-weight: bold; }
        
        .playlist-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 10px; border-radius: 15px; text-align: center; cursor: pointer; }
        .card .art { width: 100%; aspect-ratio: 1; border-radius: 10px; margin-bottom: 8px; background-size: cover !important; background-position: center !important; }

        .exit-btn { background: linear-gradient(145deg, #ff4d4d, #b33636); color: white; border: none; padding: 8px 18px; border-radius: 50px; font-size: 11px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #802626; transition: 0.1s; }
        .exit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #802626; }

        .pl-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        #plHeaderImg { width: 60px; height: 60px; border-radius: 12px; background-size: cover !important; border: 1px solid var(--border); }

        .song-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        .song-img { width: 40px; height: 40px; border-radius: 8px; margin-right: 12px; object-fit: cover; }

        .player { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(15, 25, 40, 0.98); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 20px; padding: 12px 15px; z-index: 1000; }
        .player-main { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .player-art { width: 40px; height: 40px; border-radius: 8px; background-size: cover !important; background-color: #111; border: 1px solid var(--border); }
        
        .controls { display: flex; align-items: center; gap: 15px; }
        .skip-btn { font-size: 18px; cursor: pointer; opacity: 0.8; }
        
        .play-btn { width: 40px; height: 40px; background: linear-gradient(145deg, #ffffff, #d1d1d1); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 0 #a3a3a3; transition: 0.1s; }
        .play-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a3a3a3; }

        .time-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 10px; position: relative; cursor: pointer; }
        .fill { height: 100%; background: var(--primary); width: 0%; border-radius: 5px; pointer-events: none; }
        #seekSlider { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; margin: 0; }
    </style>
</head>
<body class="home-view">

    <audio id="mainAudio"></audio>

    <header>
        <div class="logo" onclick="resetToHome()">ADIFY</div>
        <div class="search-wrapper" id="searchWrap" onclick="toggleSearch()">
            <span>🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search track or playlist..." oninput="smartSearch()" onclick="event.stopPropagation()">
        </div>
    </header>

    <div id="homeView" class="view active">
        <div id="searchView" style="display:none;">
            <p class="section-title">Search Results</p>
            <div id="searchResults"></div>
        </div>
        <div id="mainContent">
            <p class="section-title">Playlists</p>
            <div class="playlist-grid">
                <div class="card" onclick="openPlaylist('Lo-Fi Sleep 😴', 'https://files.catbox.moe/0j9stc.jpeg')"><div class="art" style="background: url('https://files.catbox.moe/0j9stc.jpeg');"></div><p style="font-size:12px;">Lo-Fi Sleep</p></div>
                <div class="card" onclick="openPlaylist('Study Time 📖', 'https://files.catbox.moe/t07xmg.jpeg')"><div class="art" style="background: url('https://files.catbox.moe/t07xmg.jpeg');"></div><p style="font-size:12px;">Study Focus</p></div>
                <div class="card" onclick="openPlaylist('Traveling ✈️', 'https://files.catbox.moe/pzdmjo.jpeg')"><div class="art" style="background: url('https://files.catbox.moe/pzdmjo.jpeg');"></div><p style="font-size:12px;">Traveling</p></div>
            </div>
            <p class="section-title">Single Tracks</p>
            <div id="singleTracksContainer"></div>
        </div>
    </div>

    <div id="playlistView" class="view">
        <div class="pl-header">
            <div id="plHeaderImg"></div>
            <h3 id="playlistTitle" style="font-size:16px;">Playlist</h3>
        </div>
        <div style="display:flex; justify-content:flex-end; margin-bottom: 15px;">
            <div class="exit-btn" onclick="resetToHome()">EXIT HOME</div>
        </div>
        <div id="songsContainer"></div>
    </div>

    <footer class="player">
        <div class="player-main">
            <div style="display:flex; align-items:center; gap:12px; width:45%;">
                <div class="player-art" id="playerImg"></div>
                <div style="overflow:hidden;"><h4 id="pTitle" style="font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Select Track</h4><p id="pArtist" style="font-size:10px; color:var(--primary);">---</p></div>
            </div>
            <div class="controls">
                <span class="skip-btn" onclick="skip(-10)">⏪</span>
                <div class="play-btn" id="playBtn" onclick="togglePlay()">▶</div>
                <span class="skip-btn" onclick="skip(10)">⏩</span>
            </div>
            <div id="pTime" style="font-size:10px; font-family:monospace;">0:00 / 0:00</div>
        </div>
        <div class="time-bar" id="progressBar">
            <div class="fill" id="fill"></div>
            <input type="range" id="seekSlider" min="0" max="100" value="0" oninput="seekAudio()">
        </div>
    </footer>

    <script>
        const audio = document.getElementById('mainAudio');

        // YAHAN APNA DATA DALO - AB FILE KI ZARURAT NAHI HAI
        const allSongs = [
            {
                "title": "Udariyan",
                "artist": "Adi Original",
                "url": "https://www.image2url.com/r2/default/audio/1778420635219-a057d459-d0af-413e-bd2f-5f148740396c.mp3",
                "image": "https://files.catbox.moe/0j9stc.jpeg",
                "category": "Lo-Fi Sleep 😴"
            },
            {
                "title": "Example Single",
                "artist": "Artist Name",
                "url": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                "image": "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300",
                "category": "Single"
            }
            // Naye gaane isi format mein yahan add karte jao
        ];

        const playlists = [
            { name: 'Lo-Fi Sleep 😴', img: 'https://files.catbox.moe/0j9stc.jpeg' },
            { name: 'Study Time 📖', img: 'https://files.catbox.moe/t07xmg.jpeg' },
            { name: 'Traveling ✈️', img: 'https://files.catbox.moe/pzdmjo.jpeg' }
        ];

        function loadApp() {
            renderSingles();
        }

        function toggleSearch() {
            const wrap = document.getElementById('searchWrap');
            wrap.classList.toggle('active');
            if(wrap.classList.contains('active')) document.getElementById('searchInput').focus();
            else { document.getElementById('searchInput').value = ""; smartSearch(); }
        }

        function smartSearch() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            let main = document.getElementById('mainContent'), sv = document.getElementById('searchView'), res = document.getElementById('searchResults');
            
            if(val.length > 0) {
                main.style.display = "none"; sv.style.display = "block";
                
                let plMatches = playlists.filter(p => p.name.toLowerCase().includes(val));
                let songMatches = allSongs.filter(s => s.title.toLowerCase().includes(val) || s.artist.toLowerCase().includes(val));
                
                let html = "";
                plMatches.forEach(p => {
                    html += `<div class="song-item" style="border: 1px solid var(--primary)" onclick="openPlaylist('${p.name}','${p.img}')">
                        <img src="${p.img}" class="song-img">
                        <div style="flex:1"><h4>${p.name}</h4><p style="font-size:10px; color:var(--primary)">Playlist</p></div>
                        <span>📂</span>
                    </div>`;
                });
                songMatches.forEach(s => {
                    html += `<div class="song-item" onclick="playSong('${s.title}','${s.artist}','${s.url}','${s.image}')">
                        <img src="${s.image}" class="song-img">
                        <div style="flex:1"><h4>${s.title}</h4><p style="font-size:10px; opacity:0.6">${s.category}</p></div>
                        <span>▶</span>
                    </div>`;
                });
                res.innerHTML = html || "<p style='text-align:center; opacity:0.5; font-size:12px;'>No results</p>";
            } else { main.style.display = "block"; sv.style.display = "none"; }
        }

        function renderSingles() {
            const singles = allSongs.filter(s => s.category === "Single");
            document.getElementById('singleTracksContainer').innerHTML = singles.map(s => `
                <div class="song-item" onclick="playSong('${s.title}','${s.artist}','${s.url}','${s.image}')">
                    <div style="display:flex; align-items:center;"><img src="${s.image}" class="song-img">
                    <div><h4>${s.title}</h4><p style="font-size:10px; opacity:0.6">${s.artist}</p></div></div>
                    <span>▶</span>
                </div>`).join('');
        }

        function openPlaylist(cat, imgUrl) {
            document.body.className = "in-playlist";
            document.getElementById('homeView').classList.remove('active');
            document.getElementById('playlistView').classList.add('active');
            document.getElementById('playlistTitle').innerText = cat;
            document.getElementById('plHeaderImg').style.background = `url('${imgUrl}')`;
            const filtered = allSongs.filter(s => s.category === cat);
            document.getElementById('songsContainer').innerHTML = filtered.map(s => `
                <div class="song-item" onclick="playSong('${s.title}','${s.artist}','${s.url}','${s.image}')">
                    <div><h4>${s.title}</h4><p style="font-size:10px; opacity:0.6">${s.artist}</p></div>
                    <span>▶</span>
                </div>`).join('');
        }

        function playSong(t, a, url, img) {
            audio.src = url; 
            audio.play().catch(e => console.log("Playback failed:", e));
            document.getElementById('pTitle').innerText = t;
            document.getElementById('pArtist').innerText = a;
            document.getElementById('playerImg').style.background = `url('${img}')`;
            document.getElementById('playBtn').innerText = '⏸';
        }

        function togglePlay() { 
            if(audio.src) { audio.paused ? (audio.play(), document.getElementById('playBtn').innerText='⏸') : (audio.pause(), document.getElementById('playBtn').innerText='▶'); }
        }

        function skip(time) { audio.currentTime += time; }
        function seekAudio() { audio.currentTime = audio.duration * (document.getElementById('seekSlider').value / 100); }
        function fmt(s) { if(isNaN(s)) return "0:00"; let m=Math.floor(s/60), sec=Math.floor(s%60); return m+":"+(sec<10?'0':'')+sec; }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const per = (audio.currentTime/audio.duration)*100;
                document.getElementById('fill').style.width = per + '%';
                document.getElementById('seekSlider').value = per;
                document.getElementById('pTime').innerText = fmt(audio.currentTime) + " / " + fmt(audio.duration);
            }
        };

        function resetToHome() {
            document.body.className = "home-view";
            document.getElementById('playlistView').classList.remove('active');
            document.getElementById('homeView').classList.add('active');
            document.getElementById('mainContent').style.display = "block";
            document.getElementById('searchView').style.display = "none";
            document.getElementById('searchInput').value = "";
            document.getElementById('searchWrap').classList.remove('active');
        }

        window.onload = loadApp;
    </script>
</body>
</html>
