<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify - Premium Music Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        /* [Aapka purana CSS yahan rahega - Maine ise short rakha hai space ke liye] */
        :root { --sky-blue: #00BFFF; --bg-black: #020202; --primary: #0084ff; --danger: #ff4757; }
        body { background: radial-gradient(circle at top right, #001f3f, #000814); color: white; font-family: "Inter", sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .app-screen { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; background: inherit; }
        .app-screen.active { display: flex; }
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #loadingOverlay.hidden { display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(0, 191, 255, 0.2); border-top-color: var(--sky-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div style="color:var(--sky-blue); margin-top:15px; letter-spacing:2px;">SYNCING CLOUD...</div>
    </div>

    <div id="loginScreen" class="app-screen active">
        <div style="margin: auto; text-align: center; width: 300px;">
            <h1 style="color: var(--sky-blue);">Adify</h1>
            <input type="email" id="login-id" placeholder="Enter Email" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #111; color: #fff; border: 1px solid #333;">
            <button onclick="handleSubmit()" style="width: 100%; padding: 12px; background: var(--sky-blue); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">GET STARTED</button>
        </div>
    </div>

    <div id="homeScreen" class="app-screen">
        <div style="padding: 20px;">
            <h2 id="welcomeText">Welcome Back</h2>
            <div id="mainPlaylistGrid"></div>
            <button onclick="doLogout()" style="margin-top: 50px; color: red; background: none; border: 1px solid red; padding: 10px; border-radius: 10px; cursor: pointer;">LOGOUT</button>
        </div>
    </div>

    <script>
        // 1. FIREBASE CONFIGURATION
        const firebaseConfig = {
            databaseURL: "https://adify-4999f-default-rtdb.firebaseio.com/"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let userPlaylists = {};
        let recentSearches = [];

        // 2. CORE SYNC LOGIC
        function getSafeId(email) {
            return email ? email.replace(/[.$#[\]]/g, "_") : null;
        }

        async function syncFromCloud(email) {
            const userId = getSafeId(email);
            try {
                const snapshot = await db.ref('users/' + userId).once('value');
                const data = snapshot.val();
                if (data) {
                    userPlaylists = data.playlists || {};
                    recentSearches = data.searchHistory || [];
                    currentUser = data.profile || currentUser;
                    console.log("Cloud Data Synced Successfully");
                }
            } catch (e) {
                console.error("Cloud Fetch Error:", e);
            }
        }

        function saveToCloud() {
            if (!currentUser) return;
            const userId = getSafeId(currentUser.email);
            db.ref('users/' + userId).update({
                profile: currentUser,
                playlists: userPlaylists,
                searchHistory: recentSearches,
                lastSeen: Date.now()
            });
        }

        // 3. AUTH HANDLERS
        async function handleSubmit() {
            const emailInput = document.getElementById('login-id').value;
            if (!emailInput || !emailInput.includes('@')) return alert("Enter valid email");

            showLoader();
            currentUser = { email: emailInput, name: "User" };
            
            // Session Backup
            localStorage.setItem('adify_session', JSON.stringify(currentUser));
            
            await syncFromCloud(emailInput);
            
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('homeScreen').classList.add('active');
            document.getElementById('welcomeText').innerText = "Hello, " + emailInput;
            hideLoader();
        }

        // 4. APP LIFECYCLE
        function showLoader() { document.getElementById('loadingOverlay').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loadingOverlay').classList.add('hidden'); }

        window.onload = async function() {
            const session = localStorage.getItem('adify_session');
            if (session) {
                currentUser = JSON.parse(session);
                await syncFromCloud(currentUser.email);
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('homeScreen').classList.add('active');
                document.getElementById('welcomeText').innerText = "Hello, " + currentUser.email;
            }
            // Always hide loader at the end
            hideLoader();
        };

        function doLogout() {
            localStorage.removeItem('adify_session');
            location.reload();
        }
    </script>
</body>
</html>
