    <script>

        // ===== TIMEOUT WRAPPER FOR ALL FIREBASE CALLS =====
        function withTimeout(promise, ms, fallbackValue) {
            return new Promise((resolve) => {
                const timer = setTimeout(() => {
                    console.warn('[Adify] Firebase timeout after ' + ms + 'ms, using fallback');
                    resolve(fallbackValue);
                }, ms);
                promise.then(result => {
                    clearTimeout(timer);
                    resolve(result);
                }).catch(err => {
                    clearTimeout(timer);
                    console.error('[Adify] Firebase error:', err);
                    resolve(fallbackValue);
                });
            });
        }

        // ===== HIDE LOADER SAFELY =====
        function hideLoader() {
            const loader = document.getElementById('loadingOverlay');
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => { loader.style.display = 'none'; }, 350);
            }
        }

        // ===== YOUTUBE API CONFIG =====
        const YOUTUBE_API_KEY = "AIzaSyBIpUJaQat1LYezbd3DYfteoVOBHAjxems";
        let youtubePlayer = null;
        let isYouTubePlaying = false;
        let currentYouTubeId = null;
        let youtubeResults = [];
        let searchTimeout = null;

        // ===== PLAYER STATE =====
        let isPlaying = false;
        let ytDuration = 0;
        let ytCurrentTime = 0;
        let ytTimeInterval = null;
        let ytPlayerReady = false;

        // ===== MEDIA SESSION API =====
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', function() { togglePlay(); });
                navigator.mediaSession.setActionHandler('pause', function() { togglePlay(); });
                navigator.mediaSession.setActionHandler('previoustrack', function() { prevTrack(); });
                navigator.mediaSession.setActionHandler('nexttrack', function() { nextTrack(); });
                navigator.mediaSession.setActionHandler('seekbackward', function(details) {
                    if (isYouTubePlaying && youtubePlayer && ytPlayerReady) {
                        const skipTime = details.seekOffset || 10;
                        youtubePlayer.seekTo(Math.max(0, ytCurrentTime - skipTime), true);
                    } else if (audio.currentTime) {
                        audio.currentTime = Math.max(0, audio.currentTime - (details.seekOffset || 10));
                    }
                });
                navigator.mediaSession.setActionHandler('seekforward', function(details) {
                    if (isYouTubePlaying && youtubePlayer && ytPlayerReady) {
                        const skipTime = details.seekOffset || 10;
                        youtubePlayer.seekTo(Math.min(ytDuration, ytCurrentTime + skipTime), true);
                    } else if (audio.currentTime) {
                        audio.currentTime = Math.min(audio.duration, audio.currentTime + (details.seekOffset || 10));
                    }
                });
            }
        }

        function updateMediaSessionMetadata(title, artist, image) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title || 'Adify Music',
                    artist: artist || 'Unknown',
                    album: 'Adify',
                    artwork: [
                        { src: image || 'https://files.catbox.moe/0j9stc.jpeg', sizes: '512x512', type: 'image/jpeg' }
                    ]
                });
                navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
            }
        }

        // ===== PAGE VISIBILITY =====
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                console.log('[Adify] App in background, continuing playback');
            } else {
                console.log('[Adify] App in foreground');
            }
        });

        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyDLBqzimyPQj16sGRC2mJaP5N4ZxjwQvm4",
            authDomain: "adify-music-9280e.firebaseapp.com",
            databaseURL: "https://adify-music-9280e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "adify-music-9280e",
            storageBucket: "adify-music-9280e.firebasestorage.app",
            messagingSenderId: "534415071027",
            appId: "1:534415071027:web:255cb8f8869d87459a5046"
        };

        let db = null;
        let firebaseReady = false;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            firebaseReady = true;
            console.log("[Adify] Firebase connected!");
        } catch(e) {
            console.error("[Adify] Firebase init error:", e);
            firebaseReady = false;
        }

        function getUserKey(email) {
            return email ? email.replace(/\./g, '_').replace(/@/g, '_at_') : 'guest';
        }

        // ===== FIREBASE USER OPERATIONS (with timeout) =====
        function saveUserToCloud(userData) {
            if (!db || !firebaseReady) return Promise.resolve();
            return withTimeout(
                db.ref('users/' + getUserKey(userData.email)).set(userData),
                5000,
                null
            );
        }

        function loadUserFromCloud(email) {
            if (!db || !firebaseReady) return Promise.resolve(null);
            return withTimeout(
                db.ref('users/' + getUserKey(email)).once('value').then(snap => snap.val()),
                4000,
                null
            );
        }

        function updateProfileInCloud(email, updates) {
            if (!db || !firebaseReady) return Promise.resolve();
            return withTimeout(
                db.ref('users/' + getUserKey(email)).update(updates),
                5000,
                null
            ).then(() => console.log("[Adify] Profile updated in cloud!"))
             .catch(err => console.error("[Adify] Cloud update error:", err));
        }

        // ===== FIREBASE PLAYLISTS (with timeout) =====
        function saveUserPlaylistsToCloud() {
            if (!db || !firebaseReady || !currentUser) return Promise.resolve();
            return withTimeout(
                db.ref('playlists/' + getUserKey(currentUser.email)).set(userPlaylists),
                5000,
                null
            ).then(() => console.log("[Adify] Playlists saved to cloud!"))
             .catch(err => console.error("[Adify] Playlist save error:", err));
        }

        function loadUserPlaylistsFromCloud() {
            if (!db || !firebaseReady || !currentUser) return Promise.resolve();
            return withTimeout(
                db.ref('playlists/' + getUserKey(currentUser.email)).once('value').then(snap => {
                    const data = snap.val();
                    if (data) {
                        Object.keys(userPlaylists).forEach(pName => {
                            if (data[pName] && Array.isArray(data[pName])) {
                                userPlaylists[pName] = data[pName];
                            }
                        });
                        console.log("[Adify] Playlists loaded from cloud!");
                    }
                }),
                4000,
                null
            ).catch(err => console.error("[Adify] Playlist load error:", err));
        }

        // ===== FIREBASE SEARCH HISTORY (with timeout) =====
        function getRecentSearchesFromCloud() {
            if (!db || !firebaseReady || !currentUser) return Promise.resolve([]);
            return withTimeout(
                db.ref('searches/' + getUserKey(currentUser.email)).once('value').then(snap => {
                    const data = snap.val();
                    return data ? (Array.isArray(data) ? data : []) : [];
                }),
                4000,
                []
            ).catch(err => { console.error("[Adify] Search load error:", err); return []; });
        }

        function saveRecentSearchToCloud(query) {
            if (!db || !firebaseReady || !currentUser || !query || query.trim().length < 2) return Promise.resolve();
            const cleanQuery = query.trim();
            return getRecentSearchesFromCloud().then(searches => {
                const filtered = searches.filter(s => s.toLowerCase() !== cleanQuery.toLowerCase());
                filtered.unshift(cleanQuery);
                const limited = filtered.slice(0, 10);
                return withTimeout(
                    db.ref('searches/' + getUserKey(currentUser.email)).set(limited),
                    5000,
                    null
                ).then(() => console.log("[Adify] Search saved to cloud!"))
                 .catch(err => console.error("[Adify] Search save error:", err));
            });
        }

        function removeRecentSearchFromCloud(query) {
            if (!db || !firebaseReady || !currentUser) return Promise.resolve();
            return getRecentSearchesFromCloud().then(searches => {
                const filtered = searches.filter(s => s !== query);
                return withTimeout(
                    db.ref('searches/' + getUserKey(currentUser.email)).set(filtered),
                    5000,
                    null
                ).then(() => console.log("[Adify] Search removed from cloud!"))
                 .catch(err => console.error("[Adify] Search remove error:", err));
            });
        }

        function clearAllRecentSearchesFromCloud() {
            if (!db || !firebaseReady || !currentUser) return Promise.resolve();
            return withTimeout(
                db.ref('searches/' + getUserKey(currentUser.email)).remove(),
                5000,
                null
            ).then(() => console.log("[Adify] All searches cleared from cloud!"))
             .catch(err => console.error("[Adify] Search clear error:", err));
        }

        function saveYoutubeSongsToCloud() {

        // ===== SESSION MANAGEMENT (Firebase only, with timeout) =====
        function saveSession(userData) {
            if (!db || !firebaseReady) return Promise.resolve();
            return withTimeout(
                db.ref('sessions/' + getUserKey(userData.email)).set({
                    ...userData,
                    lastLogin: Date.now()
                }),
                5000,
                null
            ).catch(err => console.error("[Adify] Session save error:", err));
        }

        function getSession() {
            return new Promise((resolve) => {
                if (!db || !firebaseReady) { resolve(null); return; }
                withTimeout(
                    db.ref('sessions').once('value').then(snapshot => {
                        const sessions = snapshot.val();
                        if (sessions) {
                            const keys = Object.keys(sessions);
                            if (keys.length > 0) {
                                const latest = sessions[keys[0]];
                                resolve(latest);
                            } else {
                                resolve(null);
                            }
                        } else {
                            resolve(null);
                        }
                    }),
                    4000,
                    null
                ).catch(err => { console.error("[Adify] Session get error:", err); resolve(null); });
            });
        }

            if (!db || !firebaseReady || !currentUser) return Promise.resolve();
            return withTimeout(
                db.ref('sessions/' + getUserKey(currentUser.email)).remove(),
                5000,

            ).catch(err => console.error("[Adify] Session clear error:", err));
        }

        async function executeSearch() {
            const query = document.getElementById('searchPageInput').value.trim();
            if (!query || query.length < 2) return;
            await saveRecentSearch(query);
            document.getElementById('recentSearchesSection').style.display = 'none';
            document.getElementById('searchResultsSection').style.display = 'block';

            const merged = [...allSongs];
            if (youtubeSongs && Array.isArray(youtubeSongs)) {
                youtubeSongs.forEach(yt => {
                    const dup = merged.some(m => m.url === yt.url || (yt.ytId && m.ytId === yt.ytId));
                    if (!dup) merged.push(yt);
                });
            }

            const localResults = merged.filter(s => 
                s.title.toLowerCase().includes(query.toLowerCase()) || 
                s.artist.toLowerCase().includes(query.toLowerCase())
            );

            const tracksDiv = document.getElementById('searchResultsTracks');
            if (localResults.length > 0) {
                tracksDiv.innerHTML = localResults.map(s => songItemTemplate(s)).join('');
            } else {
                tracksDiv.innerHTML = '<div class="no-recent">No tracks found</div>';
            }

            const ytSection = document.getElementById('ytSearchResultsSection');
            const ytDiv = document.getElementById('searchResultsYouTube');
            ytSection.style.display = 'block';
            ytDiv.innerHTML = '<div class="yt-loading">🔍 Searching YouTube...</div>';

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " song")}&type=video&videoCategoryId=10&key=${YOUTUBE_API_KEY}&maxResults=10`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.error || !data.items || data.items.length === 0) {
                    ytSection.style.display = 'none';
                    return;
                }

                youtubeResults = data.items.map((item, idx) => ({
                    id: 'yt_' + idx,
                    videoId: item.id.videoId,
                    title: item.snippet.title,
                    artist: item.snippet.channelTitle,
                    image: item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url
                }));

                youtubeResults.forEach(yt => {
                    const exists = youtubeSongs.some(s => s.videoId === yt.videoId);
                    if (!exists) {
                        youtubeSongs.push({
                            id: 'yt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            ytId: yt.videoId,
                            title: yt.title,
                            artist: yt.artist,
                            url: 'youtube://' + yt.videoId,
                            image: yt.image
                        });
                    }
                });
                await saveYoutubeSongsToCloud();

                let html = '';
                youtubeResults.forEach((song) => {
                    html += ytSongItemTemplate(song);
                });
                ytDiv.innerHTML = html;

            } catch (err) {
                console.error("[Adify] YouTube search error:", err);
                ytSection.style.display = 'none';
            }
        }

        function loadYouTubePlayer(videoId) {
            const wrapper = document.getElementById('yt-player-wrapper');
            wrapper.innerHTML = '';
            if (!window.YT || !YT.Player) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                tag.onload = function() {
                    window._pendingVideoId = videoId;
                };
                document.head.appendChild(tag);
            } else {
                createYouTubePlayer(videoId);
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            if (window._pendingVideoId) {
                createYouTubePlayer(window._pendingVideoId);
                window._pendingVideoId = null;
            }
        };

        function createYouTubePlayer(videoId) {
            const wrapper = document.getElementById('yt-player-wrapper');
            wrapper.innerHTML = '<div id="youtube-player"></div>';
            try {
                youtubePlayer = new YT.Player('youtube-player', {
                    height: '1',
                    width: '1',
                    videoId: videoId,
                    playerVars: {
                        autoplay: 1,
                        controls: 0,
                        disablekb: 1,
                        fs: 0,
                        modestbranding: 1,
                        rel: 0,
                        showinfo: 0,
                        iv_load_policy: 3,
                        playsinline: 1
                    },
                    events: {
                        'onReady': function(event) {
                            ytPlayerReady = true;
                            event.target.playVideo();
                            event.target.unMute();
                            startYtTimeUpdate();
                        },
                        'onStateChange': function(event) {
                            if (event.data === YT.PlayerState.ENDED) {
                                if (isAutoPlayMode) {
                                    playNextYoutubeAuto();
                                } else {
                                    nextTrack();
                                }
                            }
                            if (event.data === YT.PlayerState.PLAYING) {
                                isPlaying = true;
                                updatePlayIcon(true);
                                document.getElementById('playerImgArt').classList.add('music-playing');
                                try {
                                    ytDuration = youtubePlayer.getDuration();
                                    document.getElementById('totalDuration').innerText = formatTime(ytDuration);
                                } catch(e) {}
                            } else if (event.data === YT.PlayerState.PAUSED) {
                                isPlaying = false;
                                updatePlayIcon(false);
                                document.getElementById('playerImgArt').classList.remove('music-playing');
                            }
                        },
                        'onError': function(event) {
                            console.error("[Adify] YouTube error:", event.data);
                            showPopup("PLAYBACK ERROR", "error");
                        }
                    }
                });
            } catch (e) {
                console.error("[Adify] Player init failed:", e);
            }
        }

        function startYtTimeUpdate() {
            if (ytTimeInterval) clearInterval(ytTimeInterval);
            ytTimeInterval = setInterval(() => {
                if (!isYouTubePlaying || !youtubePlayer || !ytPlayerReady) return;
                try {
                    ytCurrentTime = youtubePlayer.getCurrentTime();
                    ytDuration = youtubePlayer.getDuration();
                    if (ytDuration > 0) {
                        const pct = (ytCurrentTime / ytDuration) * 100;
                        document.getElementById('fill').style.width = pct + '%';
                        document.getElementById('seekSlider').value = pct * 10;
                        document.getElementById('currentTime').innerText = formatTime(ytCurrentTime);
                        document.getElementById('totalDuration').innerText = formatTime(ytDuration);
                    }
                } catch(e) {}
            }, 500);
        }

        function stopYtTimeUpdate() {
            if (ytTimeInterval) {
                clearInterval(ytTimeInterval);
                ytTimeInterval = null;
            }
        }

        function stopYouTubePlayer() {
            stopYtTimeUpdate();
            if (youtubePlayer) {
                try { youtubePlayer.stopVideo(); } catch(e) {}
                try { youtubePlayer.destroy(); } catch(e) {}
                youtubePlayer = null;
            }
            const wrapper = document.getElementById('yt-player-wrapper');
            if (wrapper) wrapper.innerHTML = '';
            isYouTubePlaying = false;
            currentYouTubeId = null;
            ytPlayerReady = false;
            ytDuration = 0;
            ytCurrentTime = 0;
        }

        function stopLocalAudio() {
            audio.pause();
            audio.src = "";
            audio.currentTime = 0;
            isPlaying = false;
        }

        let isAutoPlayMode = false;
        let youtubeShuffleQueue = [];
        let currentYoutubeQueueIndex = -1;

        function startYoutubeAutoPlay(currentVideoId) {
            if (youtubeSongs.length === 0) return;
            youtubeShuffleQueue = [...youtubeSongs];
            for (let i = youtubeShuffleQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [youtubeShuffleQueue[i], youtubeShuffleQueue[j]] = [youtubeShuffleQueue[j], youtubeShuffleQueue[i]];
            }
            currentYoutubeQueueIndex = youtubeShuffleQueue.findIndex(s => s.ytId === currentVideoId);
            if (currentYoutubeQueueIndex === -1) currentYoutubeQueueIndex = 0;
        }

        function playNextYoutubeAuto() {
            if (!isAutoPlayMode || youtubeShuffleQueue.length === 0) return;
            currentYoutubeQueueIndex++;
            if (currentYoutubeQueueIndex >= youtubeShuffleQueue.length) {
                for (let i = youtubeShuffleQueue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [youtubeShuffleQueue[i], youtubeShuffleQueue[j]] = [youtubeShuffleQueue[j], youtubeShuffleQueue[i]];
                }
                currentYoutubeQueueIndex = 0;
            }
            const next = youtubeShuffleQueue[currentYoutubeQueueIndex];
            playYouTubeSong(next.ytId, next.title, next.artist, next.image);
        }

        async function tryFirebaseLogin(lid, lpass) {
            if (!db || !firebaseReady) return { error: "FIREBASE NOT CONNECTED" };

            if (lid.includes('@')) {
                const user = await loadUserFromCloud(lid);
                if (!user) return null;
                if (user.password === lpass) {
                    return user;
                } else {
                    return { error: "WRONG PASSWORD" };
                }
            } else {
                // Phone login - search all users
                const snapshot = await withTimeout(db.ref('users').once('value'), 5000, null);
                if (!snapshot) return null;
                const users = snapshot.val();
                if (!users) return null;
                for (let key in users) {
                    if (users[key] && users[key].phone === lid) {
                        if (users[key].password === lpass) {
                            return users[key];
                        } else {
                            return { error: "WRONG PASSWORD" };
                        }
                    }
                }
                return null;
            }
        }

        async function finalizeLogin(user) {
            currentUser = user;
            await saveSession(user);
            await loadUserPlaylistsFromCloud();
            await loadYoutubeSongsFromCloud();

            if (currentUser.photo) {
                document.getElementById('main-pfp').src = currentUser.photo;
                document.getElementById('homeProfileImg').src = currentUser.photo;
            }
            showPopup(`WELCOME BACK, ${currentUser.name.toUpperCase()}`, "success");
            setTimeout(() => { openHome(); }, 1000);
        }

        async function handleSubmit() {
            if (!isRegisterMode) {
                const lid = document.getElementById('login-id').value.toLowerCase().trim();
                const lpass = document.getElementById('login-pass').value;
                if (lid === "1" && lpass === "1") {
                    showPopup("MASTER LOGIN SUCCESS", "success");
                    currentUser = { name: 'Master', email: 'master@adify.com', phone: '0000000000', gender: 'Male', age: 21 };
                    await saveSession(currentUser);
                    await loadUserPlaylistsFromCloud();
                    await loadYoutubeSongsFromCloud();
                    setTimeout(() => { openHome(); }, 1000); 
                    return;
                }

                showPopup("VERIFYING USER...", "success");
                const result = await tryFirebaseLogin(lid, lpass);
                if (result === null) {
                    showPopup("USER NOT FOUND", "error");
                } else if (result.error) {
                    if (result.error.includes("FIREBASE")) {
                        showPopup("SERVER ERROR - CHECK CONSOLE", "error");
                    } else {
                        showPopup(result.error, "error");
                    }
                } else {
                    await finalizeLogin(result);
                }
            } else {
                const name = document.getElementById('full-name').value;
                const emailInput = document.getElementById('reg-email').value;
                const email = emailInput.toLowerCase();
                const phone = document.getElementById('reg-phone').value;
                const pass = document.getElementById('reg-pass').value;
                const age = document.getElementById('reg-age').value;

                // Check if email already registered in Firebase
                const existingUser = await loadUserFromCloud(email);
                if (existingUser) { showPopup("EMAIL ALREADY REGISTERED", "error"); return; }

                // Check phone count
                const phoneSnapshot = await withTimeout(db.ref('users').once('value'), 5000, null);
                if (!phoneSnapshot) { showPopup("SERVER ERROR", "error"); return; }
                const allUsers = phoneSnapshot.val() || {};
                let phoneCount = 0;
                for (let key in allUsers) {
                    if (allUsers[key].phone === phone) phoneCount++;
                }
                if (phoneCount >= 3) { showPopup("MAX 3 ACCOUNTS PER NUMBER", "error"); return; }

                if (name && emailRegex.test(emailInput) && phone.length === 10 && pass.length >= 8 && age >= 18) {
                    const userData = { name: name, email: email, phone: phone, password: pass, gender: selectedGender, age: age, photo: null };
                    showPopup("SYNCING TO CLOUD...", "success");
                    try {
                        await saveUserToCloud(userData);
                        showPopup("REGISTERED SUCCESSFULLY", "success");
                    } catch(e) {
                        showPopup("REGISTERED - CLOUD SYNC FAILED", "error");
                    }
                    setTimeout(() => {
                        toggleAuth(false);
                        showPopup("PLEASE LOG IN WITH YOUR DETAILS", "success");
                    }, 1500);
                } else { 
                    showPopup("PLEASE FIX ALL ERRORS", "error"); 
                }
            }
        }

        // ===== HOME FUNCTIONS =====
        function handleGlobalClick() {
            document.getElementById('globalPopup').classList.remove('show');
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        function formatTime(s) { if (!s || isNaN(s) || !isFinite(s)) return "0:00"; let m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        function openMenu(e, id) {
            e.stopPropagation();
            const popup = document.getElementById('globalPopup');
            document.getElementById('playlistOptions').innerHTML = playlistsData.map(p => {
                const ex = userPlaylists[p.name].some(x => x.id === id);
                return '<div class="menu-item" onclick="playlistAction(' + id + ', ' + "'" + p.name + "', " + ex + ')"><span>' + p.name + '</span><span style="color:' + (ex ? 'var(--danger)' : 'var(--primary)') + '; font-weight:bold;">' + (ex ? 'REMOVE' : 'ADD') + '</span></div>';
            }).join(''); popup.classList.add('show');
        }
        async function playlistAction(id, pN, ex) {
            if (ex) userPlaylists[pN] = userPlaylists[pN].filter(s => s.id !== id);
            else userPlaylists[pN].push(allSongs.find(s => s.id === id));
            showToast(ex ? "Removed!" : "Added!");
            await saveUserPlaylists();
            document.getElementById('globalPopup').classList.remove('show'); refreshView();
        }
        function songItemTemplate(s) {
            const isP = currentUrl === s.url, isS = selectedSongs.has(s.id);
            let clickAction;
            if (isSelectionMode) {
                clickAction = "toggleSelectSong(" + s.id + ")";
            } else if (s.ytId) {
                const escapedTitle = s.title.replace(/'/g, "\'");
                const escapedArtist = s.artist.replace(/'/g, "\'");
                clickAction = "playYouTubeSong('" + s.ytId + "', '" + escapedTitle + "', '" + escapedArtist + "', '" + s.image + "')";
            } else {
                const escapedTitle = s.title.replace(/'/g, "\'");
                const escapedArtist = s.artist.replace(/'/g, "\'");
                clickAction = "playSong('" + escapedTitle + "','" + escapedArtist + "','" + s.url + "','" + s.image + "')";
            }
            const moreBtn = !isSelectionMode 
                ? (s.ytId 
                    ? '<div class="more-btn" onclick="event.stopPropagation(); openYtMenu(event, ' + "'" + s.ytId + "')" + '">⋮</div>' 
                    : '<div class="more-btn" onclick="openMenu(event, ' + s.id + ')">⋮</div>')
                : '<div style="color:var(--danger); font-weight:bold; margin-right:10px;">' + (isS ? '✓' : '') + '</div>';
            return '<div class="song-item ' + (isP ? 'playing-active' : '') + ' ' + (isS ? 'selected-to-remove' : '') + '" onclick="' + clickAction + '"><div style="display:flex; align-items:center; flex:1"><div class="img-container"><img src="' + s.image + '" class="song-img"></div><div style="overflow:hidden; flex:1"><h4>' + s.title + '</h4><p style="font-size:10px; opacity:0.5">' + s.artist + '</p></div></div>' + moreBtn + '</div>';
        }
        function renderAll() {
            try {
                document.getElementById('mainPlaylistGrid').innerHTML = playlistsData.filter(p => p.name.toLowerCase().includes(searchQuery)).map(p => '<div class="card" onclick="openPlaylist(' + "'" + p.name + "')" + '"><div class="art" style="background: url(' + "'" + p.img + "');" + '"></div><p style="font-size:10px;">' + p.name + '</p></div>').join('');
                const merged = [...allSongs];
                if (youtubeSongs && Array.isArray(youtubeSongs)) {
                    youtubeSongs.forEach(yt => {
                        const dup = merged.some(m => m.url === yt.url || (yt.ytId && m.ytId === yt.ytId));
                        if (!dup) merged.push(yt);
                    });
                }
                const container = document.getElementById('singleTracksContainer');
                if (container) {
                    container.innerHTML = merged.filter(s => s.title.toLowerCase().includes(searchQuery)).map(s => songItemTemplate(s)).join('');
                }
            } catch(err) {
                console.error("[Adify] renderAll error:", err);
            }
        }

        function playSong(t, a, u, i) {
            if (isYouTubePlaying) {
                stopYouTubePlayer();
            }
            isAutoPlayMode = false;
            currentTrackData = { title: t, artist: a, url: u, image: i };
            currentUrl = u;
            isPlaying = true;
            audio.pause();
            audio.src = u;
            audio.load();
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    document.getElementById('pTitle').innerText = t;
                    document.getElementById('pArtist').innerText = a;
                    const art = document.getElementById('playerImgArt');
                    art.style.backgroundImage = "url('" + i + "')";
                    art.style.backgroundSize = 'cover';
                    art.classList.add('music-playing');
                    updatePlayIcon(true);
                    updateMediaSessionMetadata(t, a, i);
                }).catch(err => {
                    document.getElementById('pTitle').innerText = t;
                    document.getElementById('pArtist').innerText = a;
                    const art = document.getElementById('playerImgArt');
                    art.style.backgroundImage = "url('" + i + "')";
                    art.style.backgroundSize = 'cover';
                    updatePlayIcon(false);
                    isPlaying = false;
                });
            } else {
                document.getElementById('pTitle').innerText = t;
                document.getElementById('pArtist').innerText = a;
                const art = document.getElementById('playerImgArt');
                art.style.backgroundImage = "url('" + i + "')";
                art.style.backgroundSize = 'cover';
                art.classList.add('music-playing');
                updatePlayIcon(true);
                updateMediaSessionMetadata(t, a, i);
            }
            refreshView();
        }

        function togglePlay() {
            if (isYouTubePlaying && youtubePlayer && ytPlayerReady) {
                try {
                    if (isPlaying) {
                        youtubePlayer.pauseVideo();
                        isPlaying = false;
                        updatePlayIcon(false);
                        document.getElementById('playerImgArt').classList.remove('music-playing');
                    } else {
                        youtubePlayer.playVideo();
                        isPlaying = true;
                        updatePlayIcon(true);
                        document.getElementById('playerImgArt').classList.add('music-playing');
                    }
                } catch(e) {
                    console.error("[Adify] YouTube toggle error:", e);
                }
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
                }
                return;
            }
            if (!audio.src || audio.src === window.location.href) {
                nextTrack();
                return;
            }
            if (audio.paused) {
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isPlaying = true;
                        updatePlayIcon(true);
                        document.getElementById('playerImgArt').classList.add('music-playing');
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.playbackState = 'playing';
                        }
                    }).catch(err => {
                        isPlaying = false;
                        updatePlayIcon(false);
                    });
                }
            } else {
                audio.pause();
                isPlaying = false;
                updatePlayIcon(false);
                document.getElementById('playerImgArt').classList.remove('music-playing');
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = 'paused';
                }
            }
        }

        function handleSeekInput() {
            const s = document.getElementById('seekSlider');
            const pct = (s.value / s.max) * 100;
            document.getElementById('fill').style.width = pct + '%';
            if (!isYouTubePlaying && audio.duration && isFinite(audio.duration)) {
                isDragging = true;
                const time = audio.duration * (s.value / 1000);
                document.getElementById('currentTime').innerText = formatTime(time);
            } else if (isYouTubePlaying && ytDuration > 0) {
                isDragging = true;
                const time = ytDuration * (s.value / 1000);
                document.getElementById('currentTime').innerText = formatTime(time);
            }
        }

        function handleSeekChange() {
            const s = document.getElementById('seekSlider');
            if (isYouTubePlaying && youtubePlayer && ytPlayerReady && ytDuration > 0) {
                const seekTime = ytDuration * (s.value / 1000);
                try {
                    youtubePlayer.seekTo(seekTime, true);
                } catch(e) {
                    console.error("[Adify] YouTube seek error:", e);
                }
                isDragging = false;
            } else if (audio.duration && isFinite(audio.duration)) {
                audio.currentTime = audio.duration * (s.value / 1000);
                isDragging = false;
            }
        }

        audio.ontimeupdate = () => {
            if (!isDragging && audio.duration && isFinite(audio.duration) && !isYouTubePlaying) {
                const p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('fill').style.width = p + '%';
                document.getElementById('seekSlider').value = p * 10;
                document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
                document.getElementById('totalDuration').innerText = formatTime(audio.duration);
            }
        };

        audio.onended = () => { 
            isPlaying = false;
            updatePlayIcon(false);
            document.getElementById('playerImgArt').classList.remove('music-playing');
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = 'none';
            }
            nextTrack(); 
        };

        audio.onloadedmetadata = () => {
            if (!isYouTubePlaying && audio.duration && isFinite(audio.duration)) {
                document.getElementById('totalDuration').innerText = formatTime(audio.duration);
            }
        };

        audio.onerror = () => {
            console.error("[Adify] Audio error:", audio.error);
            isPlaying = false;
            updatePlayIcon(false);
            document.getElementById('playerImgArt').classList.remove('music-playing');
        };

        function openPlaylist(n) {
            activeP = n;
            document.getElementById('homeView').classList.remove('active');
            document.getElementById('playlistView').classList.add('active');
            document.getElementById('playlistTitle').innerText = n;
            const stb = document.getElementById('searchToggleBtn');
            if (stb) stb.style.display = 'none';
            renderPlaylistSongs();

        function resetToHome() {
            activeP = null;
            document.getElementById('playlistView').classList.remove('active');
            document.getElementById('homeView').classList.add('active');
            const stb = document.getElementById('searchToggleBtn');
            if (stb) stb.style.display = 'flex';
            renderAll();
        }
        function enableSelectionMode() {
            isSelectionMode = true; selectedSongs.clear();
            document.getElementById('modeBtn').style.display = 'none';
            document.getElementById('confirmBtn').style.display = 'block';
            document.getElementById('cancelBtn').style.display = 'block';
            renderPlaylistSongs();
        }
        function disableSelectionMode() {
            isSelectionMode = false; selectedSongs.clear();
            document.getElementById('modeBtn').style.display = 'block';
            document.getElementById('confirmBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
            renderPlaylistSongs();
        }
        function toggleSelectSong(id) { selectedSongs.has(id) ? selectedSongs.delete(id) : selectedSongs.add(id); renderPlaylistSongs(); }
        async function confirmRemoval() { 
            userPlaylists[activeP] = userPlaylists[activeP].filter(s => !selectedSongs.has(s.id)); 
            await saveUserPlaylists();
            showToast("Songs Removed!"); 
            disableSelectionMode(); 
        }
        function renderPlaylistSongs() {
            let list = userPlaylists[activeP] || [];
            document.getElementById('songsContainer').innerHTML = list.length ? list.map(s => songItemTemplate(s)).join('') : "<p style='text-align:center; opacity:0.3; padding:20px;'>Empty.</p>";
        }
        function refreshView() { if (activeP) renderPlaylistSongs(); else renderAll(); }

        function nextTrack() {
            stopAllPlayback();
            const r = allSongs[Math.floor(Math.random() * allSongs.length)];
            playSong(r.title, r.artist, r.url, r.image);
        }

        function prevTrack() {
            stopAllPlayback();
            const r = allSongs[Math.floor(Math.random() * allSongs.length)];
            playSong(r.title, r.artist, r.url, r.image);
        }

        // ===== PROFILE FUNCTIONS =====
        async function detectDevice() {
            let model = "Adify Terminal";
            if (navigator.userAgentData) {
                try {
                    const info = await navigator.userAgentData.getHighEntropyValues(["model"]);
                    model = info.model || "Mobile Node";
                } catch(e) {}
            }
            document.getElementById('p-device').innerText = model;
        }
        function contactSupport() { window.open("https://adityaprofile-rho.vercel.app/", "_blank"); }
        function setGenderProfile(el, val) {
            const parent = el.parentElement;
            if (parent) parent.querySelectorAll('.gender-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active'); selectedGenderProfile = val;
        }
        function openEdit() {

            document.getElementById('edit-age').value = parseInt(ageText) || 22;

        function handleImg(e) {

        async function saveProfile() {
            const newName = document.getElementById('edit-name').value;

            if (newName && newAge) {
                currentUser.name = newName;
                currentUser.age = newAge;
                currentUser.gender = selectedGenderProfile;
                if (currentPhoto) currentUser.photo = currentPhoto;

                // Save to Firebase
                await saveUserToCloud(currentUser);
                await updateProfileInCloud(currentUser.email, {
                    name: newName, age: newAge, gender: selectedGenderProfile, photo: currentUser.photo
                });
                await saveSession(currentUser);

                document.getElementById('display-name').innerText = newName;
                document.getElementById('p-gender').innerText = selectedGenderProfile;
                document.getElementById('p-age').innerText = newAge + " Years";
                if (currentUser.photo) {
                    document.getElementById('main-pfp').src = currentUser.photo;
                    document.getElementById('homeProfileImg').src = currentUser.photo;
                }
                closeEdit();
                const t = document.getElementById('toast');
                t.innerText = "PROFILE UPDATED SUCCESSFULLY";
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            }

        function showLogout() { document.getElementById('logout-modal').style.display = 'flex'; }
        function hideLogout() { document.getElementById('logout-modal').style.display = 'none'; }

        async function saveYoutubeSongs() {
            if (currentUser && db && firebaseReady) {
                await saveYoutubeSongsToCloud();
            }
        }

        async function loadYoutubeSongs() {

                await loadYoutubeSongsFromCloud();

                youtubeSongs = [];

        // ===== BACK BUTTON HANDLER =====
        let isHandlingBack = false;
        let backPressCount = 0;
        let backPressTimer = null;

        function handleBackButton(e) {
            if (isHandlingBack) return;
            isHandlingBack = true;
            setTimeout(() => { isHandlingBack = false; }, 300);
            if (e && e.preventDefault) e.preventDefault();

            const searchScreen = document.getElementById('searchScreen');
            if (searchScreen && searchScreen.classList.contains('active')) {
                closeSearch();
                return;
            }

            const profileScreen = document.getElementById('profileScreen');
            if (profileScreen && profileScreen.classList.contains('active')) {
                closeProfile();
                return;
            }

            const playlistView = document.getElementById('playlistView');
            if (playlistView && playlistView.classList.contains('active')) {
                resetToHome();
                return;
            }

            const homeScreen = document.getElementById('homeScreen');
            if (homeScreen && homeScreen.classList.contains('active')) {
                backPressCount++;
                if (backPressCount === 1) {
                    showToast("Press back again to exit");
                    if (backPressTimer) clearTimeout(backPressTimer);
                    backPressTimer = setTimeout(() => { backPressCount = 0; }, 2000);
                } else {
                    backPressCount = 0;
                    if (backPressTimer) clearTimeout(backPressTimer);
                    if (navigator.app && navigator.app.exitApp) {
                        navigator.app.exitApp();
                    } else {
                        showToast("Use app switcher to close");
                    }
                }
                return;
            }

            const loginScreen = document.getElementById('loginScreen');
            if (loginScreen && loginScreen.classList.contains('active')) {
                if (navigator.app && navigator.app.exitApp) {
                    navigator.app.exitApp();
                } else {
                    showToast("Use app switcher to close");
                }
            }
        }

        function setupBackButton() {
            if (window.history && window.history.pushState) {
                window.history.pushState({page: 'app'}, '', window.location.href);
            }
            window.addEventListener('popstate', function(e) {
                e.preventDefault();
                handleBackButton(e);
                if (window.history && window.history.pushState) {
                    window.history.pushState({page: 'app'}, '', window.location.href);
                }
            });
            document.addEventListener('backbutton', function(e) {
                e.preventDefault();
                handleBackButton(e);
            }, false);
        }

        // ===== window.onload - FIXED WITH TIMEOUT =====
        window.onload = async function() {
            // Auto-hide loader after max 4 seconds no matter what
            setTimeout(() => {
                hideLoader();
                if (!currentUser) {
                    // If no user loaded yet, show login screen
                    document.getElementById('homeScreen').classList.remove('active');
                    document.getElementById('loginScreen').classList.add('active');
                }
            }, 4000);

            setupMediaSession();

            try {
                const user = await getSession();
                if (user && user.email) {
                    currentUser = user;
                    await loadUserPlaylistsFromCloud();
                    await loadYoutubeSongsFromCloud();
                    updateProfileUI(currentUser);
                    document.getElementById('loginScreen').classList.remove('active');
                    document.getElementById('homeScreen').classList.add('active');
                    renderAll();
                    detectDevice();

                    hideLoader();

                    setTimeout(() => {
                        showPopup("WELCOME BACK, " + (currentUser.name || "USER").toUpperCase(), "success");
                    }, 500);

                    // Sync with cloud
                    const cloudData = await loadUserFromCloud(currentUser.email);
                    if (cloudData) {
                        currentUser = cloudData;
                        await saveSession(currentUser);
                        updateProfileUI(currentUser);
                    }

                    setupBackButton();
                    return;
                }
            } catch(err) {
                console.error("[Adify] Session load error:", err);
            }

            // No session or error - show login
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
            renderAll();
            detectDevice();
            hideLoader();
            setupBackButton();
        };
