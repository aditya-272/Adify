<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify - Cloud Fixed</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --sky-blue: #00BFFF; --bg-black: #020202; }
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; position: fixed; flex-direction: column; }
        .screen.active { display: flex; }
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #loadingOverlay.hidden { display: none; }
        .btn { padding: 12px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--sky-blue); color: black; }
        input { width: 80%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div style="text-align: center;">
            <i class="fas fa-sync fa-spin" style="font-size: 3rem; color: var(--sky-blue);"></i>
            <p style="margin-top: 15px; letter-spacing: 2px;">ADIFY CLOUD SYNC...</p>
        </div>
    </div>

    <div id="loginScreen" class="screen active">
        <div style="margin: auto; text-align: center; width: 320px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px;">
            <h1 style="color: var(--sky-blue); font-size: 2.5rem; margin-bottom: 20px;">Adify</h1>
            <input type="email" id="userEmail" placeholder="Enter Email">
            <button class="btn btn-primary" onclick="handleAuth()">LOGIN TO CLOUD</button>
        </div>
    </div>

    <div id="homeScreen" class="screen">
        <div style="padding: 30px;">
            <h2 id="welcomeText" style="color: var(--sky-blue);">Hello!</h2>
            <p>Your search history and playlists are now synced across devices.</p>
            <div id="status" style="background: #111; padding: 15px; border-radius: 10px; margin-top: 20px;">
                <i class="fas fa-cloud-check" style="color: #2ed573;"></i> Cloud Connected
            </div>
            <button class="btn" style="margin-top: 40px; background: #ff4757; color: white;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            databaseURL: "https://adify-4999f-default-rtdb.firebaseio.com/"
        };

        // Error check: Agar firebase load nahi hua toh console pe batayega
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
        } else {
            alert("Firebase not loaded! Check your internet connection.");
        }

        let currentUser = null;
        let userPlaylists = {};
        let recentSearches = [];

        // --- 2. CLOUD CORE LOGIC ---
        function getSafeId(email) {
            return email.replace(/[.$#[\]]/g, "_");
        }

        async function syncFromCloud(email) {
            const userId = getSafeId(email);
            try {
                const snapshot = await db.ref('users/' + userId).once('value');
                const data = snapshot.val();
                if (data) {
                    userPlaylists = data.playlists || {};
                    recentSearches = data.searchHistory || [];
                    console.log("Cloud Sync: Success");
                }
            } catch (e) {
                console.error("Cloud Sync Error:", e);
            }
        }

        function saveToCloud() {
            if (!currentUser) return;
            const userId = getSafeId(currentUser.email);
            db.ref('users/' + userId).update({
                email: currentUser.email,
                playlists: userPlaylists,
                searchHistory: recentSearches,
                lastSeen: Date.now()
            });
        }

        // --- 3. UI HANDLERS ---
        async function handleAuth() {
            const email = document.getElementById('userEmail').value;
            if (!email || !email.includes('@')) return alert("Enter a valid email!");

            document.getElementById('loadingOverlay').classList.remove('hidden');
            currentUser = { email: email };
            localStorage.setItem('adify_session', JSON.stringify(currentUser));
            
            await syncFromCloud(email);
            updateUI(true);
        }

        function updateUI(isLoggedIn) {
            const loader = document.getElementById('loadingOverlay');
            if (isLoggedIn) {
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('homeScreen').classList.add('active');
                document.getElementById('welcomeText').innerText = "Hello, " + currentUser.email;
            } else {
                document.getElementById('loginScreen').classList.add('active');
                document.getElementById('homeScreen').classList.remove('active');
            }
            loader.classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('adify_session');
            location.reload();
        }

        // --- 4. APP START ---
        window.onload = async function() {
            const session = localStorage.getItem('adify_session');
            if (session) {
                currentUser = JSON.parse(session);
                await syncFromCloud(currentUser.email);
                updateUI(true);
            } else {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
