<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify - Premium Music Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #00BFFF;
            --deep-blue: #001529;
            --bg-black: #020202;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-edge: rgba(0, 191, 255, 0.15);
            --neon-shadow: 0 8px 32px 0 rgba(0, 191, 255, 0.2);
            --danger: #ff4757;
            --success: #2ed573;
            --primary: #0084ff;
            --border: rgba(255, 255, 255, 0.12);
            --popup-bg: rgba(10, 26, 47, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: radial-gradient(circle at top right, #001f3f, #000814);
            color: white;
            height: 100vh;
            overflow: hidden;
            font-family: "Inter", "Poppins", "Segoe UI", sans-serif;
        }
        button, input, .gender-opt { outline: none !important; border: none; font-family: inherit; }
        .app-screen { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; scrollbar-width: none; background: radial-gradient(circle at top right, #001f3f, #000814); }
        .app-screen.active { display: flex; }
        .profile-screen { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; scrollbar-width: none; background: var(--bg-black); background-image: radial-gradient(circle at top right, #001a33, transparent); }
        .profile-screen.active { display: flex; }
        /* ... (all other CSS unchanged, same as previous) ... */
        .menu-dropdown { position: fixed; right: 20px; top: 50%; transform: translateY(-50%) scale(0.9); background: var(--popup-bg); backdrop-filter: blur(25px); border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0, 132, 255, 0.3); border-radius: 20px; z-index: 3000; display: none; width: 240px; opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .menu-dropdown.show { display: block; opacity: 1; transform: translateY(-50%) scale(1); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>

    <div id="yt-player-wrapper"></div>
    <audio id="mainAudio"></audio>
    <div id="toast"><i class="fas fa-shield-alt"></i> PROFILE SECURED</div>
    <div id="status-popup"></div>

    <!-- Global Popup (always visible) -->
    <div class="menu-dropdown" id="globalPopup" onclick="event.stopPropagation()">
        <div class="menu-header">ADD TO PLAYLIST</div>
        <div id="playlistOptions"></div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="app-screen active">
        <!-- ... (exactly same as before, no change) ... -->
    </div>

    <!-- HOME SCREEN -->
    <div id="homeScreen" class="app-screen">
        <!-- ... (same structure) ... -->
    </div>

    <!-- SEARCH SCREEN -->
    <div id="searchScreen" class="app-screen">
        <!-- ... (same structure) ... -->
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profileScreen" class="profile-screen">
        <!-- ... (same structure) ... -->
    </div>

    <script>
        // ==================== FIXED & IMPROVED ====================
        const YOUTUBE_API_KEY = "AIzaSyBIpUJaQat1LYezbd3DYfteoVOBHAjxems";
        let youtubePlayer = null, isYouTubePlaying = false, currentYouTubeId = null, youtubeResults = [];
        let searchTimeout = null, isPlaying = false, ytDuration = 0, ytCurrentTime = 0, ytTimeInterval = null, ytPlayerReady = false;
        let playHistory = [], historyIndex = -1, recentlyPlayed = [];

        // ---- MEDIA SESSION (NOTIFICATION) ----
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => togglePlay());
                navigator.mediaSession.setActionHandler('pause', () => togglePlay());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
                navigator.mediaSession.setActionHandler('seekbackward', (d) => {
                    if (isYouTubePlaying && youtubePlayer && ytPlayerReady) youtubePlayer.seekTo(Math.max(0, ytCurrentTime - (d.seekOffset || 10)), true);
                    else if (audio.currentTime) audio.currentTime = Math.max(0, audio.currentTime - (d.seekOffset || 10));
                });
                navigator.mediaSession.setActionHandler('seekforward', (d) => {
                    if (isYouTubePlaying && youtubePlayer && ytPlayerReady) youtubePlayer.seekTo(Math.min(ytDuration, ytCurrentTime + (d.seekOffset || 10)), true);
                    else if (audio.currentTime) audio.currentTime = Math.min(audio.duration, audio.currentTime + (d.seekOffset || 10));
                });
            }
        }
        function updateMediaSessionMetadata(title, artist, image) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title || 'Adify Music',
                    artist: artist || 'Unknown',
                    album: 'Adify',
                    artwork: [{ src: image || 'https://files.catbox.moe/0j9stc.jpeg', sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
            }
        }

        // ---- BACKGROUND PLAYBACK KEEP ALIVE ----
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) {
                // Force resume audio if browser paused it
                if (!isYouTubePlaying && audio.paused && audio.src) {
                    audio.play().catch(() => {});
                }
                // YouTube iframe will keep playing by itself if visible is not required
            }
        });

        // ---- FIREBASE SETUP ----
        const firebaseConfig = {
            apiKey: "AIzaSyDLBqzimyPQj16sGRC2mJaP5N4ZxjwQvm4",
            authDomain: "adify-music-9280e.firebaseapp.com",
            databaseURL: "https://adify-music-9280e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "adify-music-9280e",
            storageBucket: "adify-music-9280e.firebasestorage.app",
            messagingSenderId: "534415071027",
            appId: "1:534415071027:web:255cb8f8869d87459a5046"
        };
        let db = null;
        try { firebase.initializeApp(firebaseConfig); db = firebase.database(); } catch(e) {}

        function userPath(email, subPath) {
            const key = email ? email.replace(/\./g, '_') : 'default';
            return subPath ? `users/${key}/${subPath}` : `users/${key}`;
        }

        // ---- SESSION (PERSISTENT VIA localStorage) ----
        function saveSessionEmail(email) { localStorage.setItem('adify_session_email', email); }
        function getSessionEmail() { return localStorage.getItem('adify_session_email'); }
        function clearSessionEmail() { localStorage.removeItem('adify_session_email'); }

        // ---- RECENT SEARCHES (CLOUD) ----
        async function getRecentSearches() { if(!db||!currentUser||!currentUser.email) return []; try{ const snap=await db.ref(userPath(currentUser.email,'recentSearches')).once('value'); const v=snap.val(); return Array.isArray(v)?v:[]; }catch(e){return[];} }
        async function saveRecentSearch(query) { if(!query||query.trim().length<2||!db||!currentUser||!currentUser.email) return; const searches=await getRecentSearches(); const clean=query.trim(); const f=searches.filter(s=>s.toLowerCase()!==clean.toLowerCase()); f.unshift(clean); try{ await db.ref(userPath(currentUser.email,'recentSearches')).set(f.slice(0,10)); }catch(e){} renderRecentSearches(); }
        async function removeRecentSearch(query) { const s=await getRecentSearches(); const upd=s.filter(x=>x!==query); if(db&&currentUser&&currentUser.email) await db.ref(userPath(currentUser.email,'recentSearches')).set(upd); renderRecentSearches(); }
        async function clearAllRecentSearches() { if(db&&currentUser&&currentUser.email) await db.ref(userPath(currentUser.email,'recentSearches')).remove(); renderRecentSearches(); }
        async function renderRecentSearches() { /* ... (same as before) ... */ }

        // ---- PLAYLISTS (CLOUD) ----
        async function saveUserPlaylists() { if(!db||!currentUser||!currentUser.email) return; try{ await db.ref(userPath(currentUser.email,'playlists')).set(userPlaylists); }catch(e){} }
        async function loadUserPlaylists() { if(!db||!currentUser||!currentUser.email) return; try{ const snap=await db.ref(userPath(currentUser.email,'playlists')).once('value'); const d=snap.val(); if(d&&typeof d==='object'){ Object.keys(userPlaylists).forEach(key=>{ if(d[key]&&Array.isArray(d[key])) userPlaylists[key]=d[key]; }); } }catch(e){} }

        // ---- YOUTUBE SONGS (CLOUD) ----
        async function saveYoutubeSongs() { if(!db||!currentUser||!currentUser.email) return; try{ await db.ref(userPath(currentUser.email,'youtubeSongs')).set(youtubeSongs); }catch(e){} }
        async function loadYoutubeSongs() { if(!db||!currentUser||!currentUser.email) return; try{ const snap=await db.ref(userPath(currentUser.email,'youtubeSongs')).once('value'); const v=snap.val(); youtubeSongs=Array.isArray(v)?v:[]; }catch(e){youtubeSongs=[];} }

        // ---- RECENTLY PLAYED (CLOUD) ----
        async function saveRecentlyPlayed() { if(!db||!currentUser||!currentUser.email) return; try{ await db.ref(userPath(currentUser.email,'recentlyPlayed')).set(recentlyPlayed); }catch(e){} }
        async function loadRecentlyPlayed() { if(!db||!currentUser||!currentUser.email) return; try{ const snap=await db.ref(userPath(currentUser.email,'recentlyPlayed')).once('value'); const v=snap.val(); recentlyPlayed=Array.isArray(v)?v:[]; }catch(e){recentlyPlayed=[];} }
        function addToRecentlyPlayed(track) { recentlyPlayed = recentlyPlayed.filter(t => t.url !== track.url && t.videoId !== track.videoId); recentlyPlayed.unshift(track); if (recentlyPlayed.length > 5) recentlyPlayed.pop(); saveRecentlyPlayed(); renderRecentlyPlayed(); }
        function renderRecentlyPlayed() { /* ... (same as before) ... */ }

        // ---- USER & PHONE COUNT ----
        async function saveUserToCloud(userData) { if(!db) return Promise.reject("DB not initialized"); return db.ref('users/'+userData.email.replace(/\./g,'_')).set(userData); }
        async function loadUserFromCloud(email) { if(!db) return null; try{ const snap=await db.ref('users/'+email.replace(/\./g,'_')).once('value'); return snap.val(); }catch(e){return null;} }
        async function updateProfileInCloud(email,updates) { if(!db) return; try{ await db.ref('users/'+email.replace(/\./g,'_')).update(updates); }catch(e){} }
        async function getPhoneCount(phone) { if(!db) return 0; try{ const snap=await db.ref('phoneCounts/'+phone).once('value'); const v=snap.val(); return typeof v==='number'?v:0; }catch(e){return 0;} }
        async function incrementPhoneCount(phone) { if(!db) return; const cur=await getPhoneCount(phone); await db.ref('phoneCounts/'+phone).set(cur+1); }

        // ---- AUDIO STATE & DATA ----
        const audio = document.getElementById("mainAudio");
        let currentUrl = "", searchQuery = "", activeP = null, isDragging = false, isSelectionMode = false, selectedSongs = new Set(), youtubeSongs = [];
        const userPlaylists = { "Lo-Fi Sleep 😴": [], "Study Focus 📖": [], "Traveling ✈️": [], "My Playlist 💖": [] };
        const allSongs = [
            { id: 1, title: "Udariyan", artist: "Aditya", url: "https://www.image2url.com/r2/default/audio/1778420635219-a057d459-d0af-413e-bd2f-5f148740396c.mp3", image: "https://www.image2url.com/r2/default/images/1778699080529-9631eada-0ad1-428f-b943-d42e5ced5f2c.jpg" },
            { id: 2, title: "BEST SHORT SONG", artist: "Aditya", url: "https://www.image2url.com/r2/default/audio/1778446960362-cacf9cfe-95fa-4724-80cd-79e9e3e38a08.mp3", image: "https://www.image2url.com/r2/default/images/1778699080529-9631eada-0ad1-428f-b943-d42e5ced5f2c.jpg" }
        ];
        const playlistsData = [
            { name: "Lo-Fi Sleep 😴", img: "https://www.image2url.com/r2/default/images/1778699080529-9631eada-0ad1-428f-b943-d42e5ced5f2c.jpg" },
            { name: "Study Focus 📖", img: "https://www.image2url.com/r2/default/images/1778699302217-816e84ce-a74d-4869-9529-c97d381b61ba.jpg" },
            { name: "Traveling ✈️", img: "https://www.image2url.com/r2/default/images/1778699378719-2b7a988c-571c-484d-acfe-29ddf4315af0.jpg" },
            { name: "My Playlist 💖", img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=300" }
        ];

        // ---- NAVIGATION ----
        function showScreen(id) { document.querySelectorAll(".app-screen,.profile-screen").forEach(s=>s.classList.remove("active")); const el=document.getElementById(id); if(el) el.classList.add("active"); }
        function openHome() { showScreen("homeScreen"); renderAll(); }
        function openProfile() { document.getElementById("profileScreen").classList.add("active"); if(currentUser) updateProfileUI(currentUser); }
        function closeProfile() { document.getElementById("profileScreen").classList.remove("active"); }

        // ---- LOGIN / LOGOUT ----
        async function doLogout() {
            stopAllPlayback();
            currentUser = null;
            clearSessionEmail();
            hideLogout(); closeProfile();
            showScreen("loginScreen");
            document.getElementById("login-id").value = "";
            document.getElementById("login-pass").value = "";
            document.getElementById('reg-fields').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('main-btn').innerText = "LOG IN";
            document.getElementById('switch-text').innerHTML = 'New here? <span onclick="toggleAuth(true)">Create Account</span>';
            isRegisterMode = false;
        }

        // ... (rest of login functions remain same) ...

        // ---- CORE FIX: PLAYLIST REMOVAL ----
        function enableSelectionMode() { isSelectionMode=true; selectedSongs.clear(); document.getElementById('modeBtn').style.display='none'; document.getElementById('confirmBtn').style.display='block'; document.getElementById('cancelBtn').style.display='block'; renderPlaylistSongs(); }
        function disableSelectionMode() { isSelectionMode=false; selectedSongs.clear(); document.getElementById('modeBtn').style.display='block'; document.getElementById('confirmBtn').style.display='none'; document.getElementById('cancelBtn').style.display='none'; renderPlaylistSongs(); }
        function toggleSelectSong(id) { selectedSongs.has(id)?selectedSongs.delete(id):selectedSongs.add(id); renderPlaylistSongs(); }
        async function confirmRemoval() {
            if (!activeP) return;
            // Remove all selected songs
            userPlaylists[activeP] = userPlaylists[activeP].filter(s => !selectedSongs.has(s.id));
            await saveUserPlaylists();
            showToast("Songs Removed!");
            disableSelectionMode();
        }

        // ... (all other functions: songItemTemplate, playTrackFromUI, renderAll, etc.) ...

        // ---- INITIALISE APP ----
        window.onload = async function() {
            setupMediaSession();
            const savedEmail = getSessionEmail();
            if (savedEmail && db) {
                // Try to restore session silently
                const user = await loadUserFromCloud(savedEmail);
                if (user) {
                    currentUser = user;
                    await loadUserPlaylists();
                    await loadYoutubeSongs();
                    await loadRecentlyPlayed();
                    updateProfileUI(currentUser);
                    showScreen('homeScreen');
                    renderAll();
                    detectDevice();
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    setTimeout(() => showPopup("WELCOME BACK, "+(currentUser.name||"USER").toUpperCase(), "success"), 500);
                    setupBackButton();
                    return;
                } else {
                    // Email saved but user not in cloud? Rare case – treat as logout
                    clearSessionEmail();
                }
            }
            // No valid session → show login
            showScreen('loginScreen');
            detectDevice();
            document.getElementById('loadingOverlay').classList.add('hidden');
            setupBackButton();
        };
    </script>
</body>
</html>
